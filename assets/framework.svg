<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Fig. 1. Overall architecture of the proposed framework</title>
<style>
.t{font-family:Arial,sans-serif;font-size:14px;fill:#333;font-weight:400}
.ts{font-family:Arial,sans-serif;font-size:12px;fill:#666;font-weight:400}
.th{font-family:Arial,sans-serif;font-size:14px;fill:#333;font-weight:500}
.arr{stroke:#666;stroke-width:1;fill:none}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.c-teal .th{fill:#085041}
.c-teal .ts{fill:#0F6E56}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.c-purple .th{fill:#3C3489}
.c-purple .ts{fill:#534AB7}
.c-coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5}
.c-coral .th{fill:#712B13}
.c-coral .ts{fill:#993C1D}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.c-gray .th{fill:#2C2C2A}
.c-gray .ts{fill:#5F5E5A}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-sm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="ts" x="200" y="28" text-anchor="middle">Inputs</text>
<text class="ts" x="566" y="28" text-anchor="middle">Precomputed</text>

<g class="c-teal">
<rect x="30" y="40" width="168" height="52" rx="6"/>
<text class="th" x="114" y="61" text-anchor="middle" dominant-baseline="central">Natural language query</text>
<text class="ts" x="114" y="79" text-anchor="middle" dominant-baseline="central">Business situation</text>
</g>

<g class="c-teal">
<rect x="216" y="40" width="168" height="52" rx="6"/>
<text class="th" x="300" y="61" text-anchor="middle" dominant-baseline="central">Prefix sequence</text>
<text class="ts" x="300" y="79" text-anchor="middle" dominant-baseline="central">Observed events</text>
</g>

<g class="c-gray">
<rect x="482" y="40" width="168" height="52" rx="6"/>
<text class="th" x="566" y="61" text-anchor="middle" dominant-baseline="central">Community assignment</text>
<text class="ts" x="566" y="79" text-anchor="middle" dominant-baseline="central">Case cluster ID</text>
</g>

<line x1="566" y1="92" x2="566" y2="128" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="520" y="142" text-anchor="middle">&#x2460; Community detection &amp; probability computation</text>
<g class="c-purple">
<rect x="390" y="154" width="260" height="72" rx="6"/>
<text class="th" x="520" y="179" text-anchor="middle" dominant-baseline="central">Transition probability</text>
<text class="th" x="520" y="197" text-anchor="middle" dominant-baseline="central">computation</text>
<text class="ts" x="520" y="215" text-anchor="middle" dominant-baseline="central">P(b | a, c) per community</text>
</g>

<line x1="520" y1="226" x2="520" y2="262" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="520" y="276" text-anchor="middle">&#x2461; Candidate event filtering</text>
<g class="c-purple">
<rect x="390" y="288" width="260" height="60" rx="6"/>
<text class="th" x="520" y="310" text-anchor="middle" dominant-baseline="central">Candidate event filtering</text>
<text class="ts" x="520" y="330" text-anchor="middle" dominant-baseline="central">Top-K by P(b|a,c), always include &lt;END&gt;</text>
</g>

<path d="M390 318 L320 318 L320 428 L260 428" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<rect x="22" y="385" width="620" height="218" rx="10" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="332" y="377" text-anchor="middle">&#x2462; LLM-based iterative suffix generation</text>

<g class="c-gray">
<rect x="38" y="398" width="220" height="192" rx="6"/>
<text class="th" x="148" y="420" text-anchor="middle" dominant-baseline="central">Prompt construction</text>
<text class="ts" x="56" y="444" dominant-baseline="central">&#x2460; Original business issue</text>
<text class="ts" x="56" y="464" dominant-baseline="central">&#x2461; Given history</text>
<text class="ts" x="56" y="484" dominant-baseline="central">&#x2462; Steps taken so far</text>
<text class="ts" x="56" y="504" dominant-baseline="central">&#x2463; Current position</text>
<text class="ts" x="56" y="524" dominant-baseline="central">&#x2464; Available next events</text>
<text class="ts" x="56" y="544" dominant-baseline="central">&#x2465; Self-check instruction</text>
</g>

<g class="c-coral">
<rect x="278" y="436" width="150" height="60" rx="6"/>
<text class="th" x="353" y="461" text-anchor="middle" dominant-baseline="central">LLM</text>
<text class="ts" x="353" y="481" text-anchor="middle" dominant-baseline="central">Claude Sonnet</text>
</g>

<g class="c-gray">
<rect x="450" y="436" width="174" height="60" rx="6"/>
<text class="th" x="537" y="461" text-anchor="middle" dominant-baseline="central">Selected event</text>
<text class="ts" x="537" y="481" text-anchor="middle" dominant-baseline="central">Next activity or &lt;END&gt;</text>
</g>

<line x1="258" y1="488" x2="276" y2="488" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="428" y1="466" x2="448" y2="466" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

<path d="M537 496 L537 618 L148 618 L148 592" stroke="#999" stroke-width="1" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow-sm)"/>
<text class="ts" x="343" y="634" text-anchor="middle">append to generated sequence · update current position</text>

<path d="M114 92 L114 396" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<path d="M300 92 L300 358 L148 358 L148 396" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<path d="M624 466 L648 466 L648 664 L492 664" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="662" y="566" text-anchor="middle" transform="rotate(90 662 566)">&lt;END&gt; or max steps</text>

<g class="c-gray">
<rect x="190" y="648" width="300" height="52" rx="6"/>
<text class="th" x="340" y="669" text-anchor="middle" dominant-baseline="central">Termination check</text>
<text class="ts" x="340" y="688" text-anchor="middle" dominant-baseline="central">&lt;END&gt; selected or max steps reached</text>
</g>

<line x1="340" y1="700" x2="340" y2="718" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="210" y="720" width="260" height="48" rx="6"/>
<text class="th" x="340" y="740" text-anchor="middle" dominant-baseline="central">Predicted activity suffix</text>
<text class="ts" x="340" y="758" text-anchor="middle" dominant-baseline="central">Complete generated sequence</text>
</g>

</svg>